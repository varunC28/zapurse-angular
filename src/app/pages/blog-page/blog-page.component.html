<div class="pt-40 min-h-screen pb-5 bg-transparent overflow-hidden relative">
  <app-particles
    className="absolute inset-0 z-0"
    [quantity]="120"
    [ease]="80"
    color="#cbd5e1"
    [refresh]="true">
  </app-particles>

  <div class="container mx-auto px-4 md:px-6 relative z-10">
    <div class="text-center max-w-3xl mx-auto mb-20 animate-in fade-in slide-in-from-bottom-8 duration-700">
      <h1>Zapurse Blog</h1>
      <p class="leading-relaxed">Discover insights, news, and updates from the world of fintech.</p>
    </div>

    <div class="w-full max-w-6xl mx-auto animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-200 fill-mode-both">
      <div class="blog-grid" [style.--columns]="columns">
        @for (post of posts; track post.slug; let i = $index) {
          <div class="blog-grid-item" [style.grid-column]="getColSpan(i)">
            <app-blog-card [post]="post" />
          </div>
        }
      </div>
    </div>
  </div>
</div>
